name: CI Pipeline

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to use'
        required: false
        type: string
        default: '20'
      run-e2e:
        description: 'Whether to run E2E tests'
        required: false
        type: boolean
        default: true
      run-snyk:
        description: 'Run Snyk vulnerability scan'
        required: false
        type: boolean
        default: true
      sonar-project-key:
        description: 'SonarQube project key'
        required: false
        type: string
        default: ''
      sonar-org:
        description: 'SonarCloud organization key'
        required: false
        type: string
        default: 'williamrr'
      sonar-project-name:
        description: 'SonarCloud project name'
        required: false
        type: string
      deploy-target:
        description: 'Deployment target (staging/production/none)'
        required: false
        type: string
        default: 'none'
    secrets: inherit
    outputs:
      coverage-percent:
        description: 'Test coverage percentage'
        value: ${{ jobs.test.outputs.coverage-percent }}
      quality-gate-status:
        description: 'Quality gate status (PASS/FAIL)'
        value: ${{ jobs.sonarqube.outputs.quality-gate-status }}
  workflow_dispatch:
    inputs:
      node-version:
        description: 'Node.js version to use'
        required: false
        type: choice
        options:
          - '18'
          - '20'
          - '22'
        default: '20'
      run-e2e:
        description: 'Whether to run E2E tests'
        required: false
        type: boolean
        default: true
      run-snyk:
        description: 'Run Snyk vulnerability scan'
        required: false
        type: boolean
        default: true
      sonar-project-key:
        description: 'SonarQube project key'
        required: false
        type: string
        default: ''
      deploy-target:
        description: 'Deployment target'
        required: false
        type: choice
        options:
          - none
          - staging
          - production
        default: none
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:

env:
  NODE_VERSION: ${{ inputs.node-version || '20' }}

jobs:
  # ============================================
  # Phase 1: Lint (Fast feedback)
  # ============================================
  lint:
    name: Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: |
            **/node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-

      - name: Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npx prettier --check .
        continue-on-error: true

  # ============================================
  # Phase 2: Test & Security (Parallel)
  # ============================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint

    outputs:
      coverage-percent: ${{ steps.extract-coverage.outputs.coverage-percent }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        if: inputs.run-e2e
        run: npx playwright install --with-deps

      - name: Run Jest unit tests with coverage
        run: npx jest --coverage --coverageReporters=text --coverageReporters=json --coverageReporters=lcov
        continue-on-error: true
        id: jest-tests

      - name: Extract coverage percentage
        if: always()
        id: extract-coverage
        run: |
          if [ -f "coverage/coverage-summary.json" ]; then
            COVERAGE=$(node -e "
              const fs = require('fs');
              const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
              const total = summary.total;
              const pct = total.lines.pct || 0;
              console.log(pct.toFixed(2));
            ")
            echo "coverage-percent=$COVERAGE" >> $GITHUB_OUTPUT
            echo "Coverage: $COVERAGE%"
          else
            echo "coverage-percent=0" >> $GITHUB_OUTPUT
            echo "No coverage report found"
          fi

      - name: Check coverage threshold (80%)
        if: always()
        run: |
          COVERAGE=${{ steps.extract-coverage.outputs.coverage-percent }}
          THRESHOLD=80
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "::warning::Coverage $COVERAGE% is below threshold of $THRESHOLD%"
          else
            echo "Coverage $COVERAGE% meets threshold of $THRESHOLD%"
          fi

      - name: Run Playwright E2E tests
        if: inputs.run-e2e
        run: npx playwright test
        continue-on-error: true

      - name: Upload Playwright report
        if: inputs.run-e2e && always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Upload test results summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/coverage-summary.json
            coverage/lcov-report/
          retention-days: 30

  # ============================================
  # Security Jobs (parallel)
  # ============================================
  gitleaks:
    name: Detect Secrets (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-audit:
    name: Audit Dependencies (npm audit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: |
            **/node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-

      - name: Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate

  snyk-scan:
    name: Snyk Vulnerability Scan
    runs-on: ubuntu-latest
    if: inputs.run-snyk == true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: |
            **/node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-

      - name: Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: |
          if [ -n "${{ secrets.SNYK_TOKEN }}" ]; then
            snyk auth ${{ secrets.SNYK_TOKEN }}
          fi
        continue-on-error: true

      - name: Run Snyk to check for vulnerabilities
        run: |
          if [ -n "${{ secrets.SNYK_TOKEN }}" ]; then
            snyk test --all-projects --severity-threshold=medium
          fi
        continue-on-error: true

      - name: Run Snyk code scan (SAST)
        run: |
          if [ -n "${{ secrets.SNYK_TOKEN }}" ]; then
            snyk code test --severity-threshold=medium
          fi
        continue-on-error: true

      - name: Upload Snyk results to Snyk
        run: |
          if [ -n "${{ secrets.SNYK_TOKEN }}" ]; then
            snyk monitor --all-projects
          fi
        continue-on-error: true

  # ============================================
  # Phase 3: SonarQube Analysis (After test)
  # ============================================
  sonarqube:
    name: SonarQube Analysis
    needs: test
    if: ${{ inputs.sonar-project-key != '' }}
    runs-on: ubuntu-latest
    permissions:
      issues: read
      checks: read
      pull-requests: read

    outputs:
      quality-gate-status: ${{ steps.sonarqube-scan.outputs.quality-gate-status }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage (LCOV)
        run: npx jest --coverage --coverageReporters=lcov --coverageReporters=json
        continue-on-error: true

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ inputs.sonar-org }}
            -Dsonar.projectKey=${{ inputs.sonar-project-key }}
            -Dsonar.projectName=${{ inputs.sonar-project-name || inputs.sonar-project-key }}
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/tests/**,**/*.config.js,**/*.config.ts,**/dist/**,**/build/**,**/.next/**
            -Dsonar.typescript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.eslint.reportPaths=eslint-report.json
            -Dsonar.testExecutionReportPaths=test-execution-report.json
        id: sonarqube-scan

      - name: Upload SonarCloud report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonarcloud-report
          path: .scannerwork/report-task.txt
          retention-days: 30

      - name: Check Quality Gate
        if: always()
        run: |
          echo "Quality Gate Status: ${{ steps.sonarqube-scan.outputs.quality-gate-status }}"
          if [ "${{ steps.sonarqube-scan.outputs.quality-gate-status }}" != "OK" ]; then
            echo "::warning::Quality Gate failed"
            exit 1
          else
            echo "Quality Gate passed"
          fi
        continue-on-error: false

  # ============================================
  # Phase 4: Deploy (Main branch only)
  # ============================================
  deploy:
    name: Deploy
    needs: [test, gitleaks, npm-audit]
    if: |
      github.ref == 'refs/heads/main' &&
      (inputs.deploy-target || 'none') != 'none'
    runs-on: ubuntu-latest
    environment: ${{ inputs.deploy-target }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Deploy to ${{ inputs.deploy-target }}
        run: |
          echo "Deploying to ${{ inputs.deploy-target }}..."
          # Add your deployment logic here
          # Examples: terraform apply, gcloud run deploy, etc.

  # ============================================
  # Summary: CI Status
  # ============================================
  ci-status:
    name: CI Status
    needs: [lint, test, gitleaks, npm-audit]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Check CI Status
        run: |
          echo "Lint: ${{ needs.lint.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "Gitleaks: ${{ needs.gitleaks.result }}"
          echo "NPM Audit: ${{ needs.npm-audit.result }}"

          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.gitleaks.result }}" != "success" ] || \
             [ "${{ needs.npm-audit.result }}" != "success" ]; then
            echo "::error::CI pipeline failed"
            exit 1
          fi

          echo "::notice::CI pipeline passed successfully"
